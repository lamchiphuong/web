<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>WEB - BETA</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet"/>

  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 15px; color: #333; overflow: hidden;
      touch-action: manipulation;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      overflow: hidden;
      width: 100%; max-width: 920px;
      display: flex; position: relative;
      min-height: 520px;
    }

    .form-wrapper {
      width: 50%; padding: 60px 40px;
      transition: all 0.6s ease; position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-wrapper.left { transform: translateX(0); }
    .form-wrapper.right { transform: translateX(100%); }

    .active .form-wrapper.left { transform: translateX(-100%); }
    .active .form-wrapper.right { transform: translateX(0); }

    h2 { text-align: center; margin-bottom: 40px; color: #4a4a4a; font-weight: 600; }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px 50px 14px 18px;
      border: 2px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.3s;
      background: #f9f9f9;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102,126,234,0.2);
      background: white;
    }

    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #5f6368;
    }

    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none;
      border-radius: 12px;
      font-size: 16px; font-weight: 500;
      cursor: pointer; transition: all 0.3s;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102,126,234,0.3);
    }

    .toggle-text {
      text-align: center; margin-top: 25px; color: #666;
    }

    .toggle-text span {
      color: #667eea; font-weight: 600; cursor: pointer;
    }

    .toggle-text span:hover { text-decoration: underline; }

    .message {
      text-align: center; margin: 15px 0 25px;
      font-weight: 500; min-height: 24px; font-size: 15px;
    }

    .success { color: #28a745; }
    .error   { color: #dc3545; }

    /* Overlay */
    .overlay {
      position: absolute; top: 0; left: 50%; right: 0; bottom: 0;
      background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
      color: white; display: flex; align-items: center; justify-content: center;
      flex-direction: column; padding: 0 40px; text-align: center;
      transition: all 0.6s ease; z-index: 2;
    }

    .active .overlay { left: 0; right: 50%; }

    .overlay h3 { font-size: 28px; margin-bottom: 20px; }
    .overlay p { font-size: 16px; margin-bottom: 30px; opacity: 0.9; }

    .overlay-btn {
      background: transparent; border: 2px solid white;
      color: white; padding: 12px 40px; border-radius: 50px;
      font-size: 16px; cursor: pointer; transition: all 0.3s;
    }

    .overlay-btn:hover {
      background: white; color: #667eea;
    }

    /* ================== GAME 2048 ================== */
    #welcomeScreen, #gameScreen {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; color: white; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; z-index: 1000; padding: 20px;
    }

    .user-info {
      position: absolute;
      top: 20px;
      right: 30px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 10px 18px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
      font-size: 15px;
      font-weight: 500;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      z-index: 1100;
    }

    .user-info button {
      background: rgba(255,255,255,0.25);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .user-info button:hover {
      background: white;
      color: #667eea;
    }

    .score-board {
      display: flex; justify-content: space-between; width: 100%; max-width: 420px;
      margin-bottom: 15px; color: white; font-size: 1.4rem;
    }

    .game-container {
      background: #bbada0; padding: 15px; border-radius: 15px;
      width: 100%; max-width: 420px; touch-action: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      background: #cdc1b4;
      padding: 10px;
      border-radius: 10px;
      width: 400px;
      height: 400px;
      margin: 0 auto;
    }

    .tile {
      display: flex; align-items: center; justify-content: center;
      font-size: 35px; font-weight: bold; border-radius: 8px;
      background: #eee4da; color: #776e65;
      width: 85px;
      height: 85px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      flex-shrink: 0;
    }

    .tile-2 { background: #eee4da; color: #776e65; }
    .tile-4 { background: #ede0c8; color: #776e65; }
    .tile-8 { background: #f2b179; color: #f9f6f2; }
    .tile-16 { background: #f59563; color: #f9f6f2; }
    .tile-32 { background: #f67c5f; color: #f9f6f2; }
    .tile-64 { background: #f65e3b; color: #f9f6f2; }
    .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 30px; }
    .tile-256, .tile-512, .tile-1024, .tile-2048 { 
      background: #edcc61; color: #f9f6f2; font-size: 28px; 
    }

    .game-buttons { 
      margin-top: 20px; 
      display: flex; 
      gap: 15px; 
    }

    .game-buttons button {
      padding: 12px 25px; border: none; border-radius: 50px; font-size: 16px; cursor: pointer;
      background: rgba(255,255,255,0.3); color: white; flex: 1;
    }

    .game-buttons button:hover { 
      background: white; color: #667eea; 
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; max-width: 420px; }
      .form-wrapper { width: 100%; padding: 45px 30px; }
      .overlay { display: none; }
      .grid { width: 360px; height: 360px; gap: 8px; padding: 8px; }
      .tile { width: 76px; height: 76px; font-size: 29px; }
      .tile-128 { font-size: 25px; }
      .tile-256, .tile-512, .tile-1024, .tile-2048 { font-size: 23px; }
    }

    @media (max-width: 480px) {
      .grid { width: 320px; height: 320px; gap: 7px; padding: 7px; }
      .tile { width: 67px; height: 67px; font-size: 26px; }
    }
  </style>
</head>
<body>

  <!-- Welcome Screen -->
  <div id="welcomeScreen">
    <h1 id="welcomeTitle">Chào mừng bạn đã quay trở lại!</h1>
    <p>Bạn có muốn chơi game 2048 không?</p>
    <div style="display:flex; gap:20px; margin-top:30px; flex-wrap:wrap; justify-content:center;">
      <button class="btn" onclick="startGame()" style="width:auto; padding:15px 40px;">Có, chơi 2048 ngay!</button>
      <button class="btn" onclick="logout()" style="width:auto; padding:15px 40px; background:#666;">Không, đăng xuất</button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="gameScreen">
    <div class="user-info">
      <span class="material-symbols-outlined">account_circle</span>
      <span id="currentUsername" class="username"></span>
      <button onclick="logout()">Đăng xuất</button>
    </div>

    <div style="width:100%; max-width:440px;">
      <div class="score-board">
        <div><strong>2048</strong></div>
        <div>Điểm: <span id="score">0</span></div>
        <div>Điểm cao: <span id="highScore">0</span></div>
      </div>

      <div class="game-container" id="gameContainer">
        <div id="grid" class="grid"></div>
      </div>

      <div class="game-buttons">
        <button onclick="newGame()">Chơi lại</button>
      </div>

      <div id="gameMessage" style="margin-top:15px; font-size:1.3rem; font-weight:600; min-height:30px; color:white;"></div>
    </div>
  </div>

  <!-- Form Login/Register -->
  <div class="container" id="container">
    <!-- Left: Login -->
    <div class="form-wrapper left">
      <h2>Đăng nhập</h2>
      <form id="loginForm">
        <div class="input-group">
          <input type="text" id="loginUsername" placeholder="Tên đăng nhập" required />
        </div>
        <div class="input-group">
          <input type="password" id="loginPassword" placeholder="Mật khẩu" required />
          <button type="button" class="toggle-password material-symbols-outlined" onclick="togglePassword('loginPassword', this)">visibility</button>
        </div>
        <div id="loginMessage" class="message"></div>
        <button type="button" class="btn" onclick="handleLogin()">Đăng nhập</button>
      </form>
      <div class="toggle-text">Chưa có tài khoản? <span onclick="toggleForm()">Đăng ký ngay</span></div>
    </div>

    <!-- Right: Register -->
    <div class="form-wrapper right">
      <h2>Đăng ký</h2>
      <form id="registerForm">
        <div class="input-group">
          <input type="text" id="regUsername" placeholder="Tên đăng nhập" required />
        </div>
        <div class="input-group">
          <input type="password" id="regPassword" placeholder="Mật khẩu" required />
          <button type="button" class="toggle-password material-symbols-outlined" onclick="togglePassword('regPassword', this)">visibility</button>
        </div>
        <div id="registerMessage" class="message"></div>
        <button type="button" class="btn" onclick="handleRegister()">Đăng ký</button>
      </form>
      <div class="toggle-text">Đã có tài khoản? <span onclick="toggleForm()">Đăng nhập</span></div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay">
      <div id="overlayContent">
        <h3 id="overlayTitle">Chào mừng trở lại!</h3>
        <p id="overlayText">Nếu chưa có tài khoản, vui lòng nhấn nút Đăng ký bên dưới</p>
        <button class="overlay-btn" onclick="toggleForm()">Đăng ký</button>
      </div>
    </div>
  </div>

  <script>
    const BIN_ID = "69bb9c45c3097a1dd53b6d8e";
    const MASTER_KEY = "$2a$10$w8HuZEOH5lKslhwqq1vyc.pW/hNhvuAzCkMse5cgH4R9cX.n27ISO";
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
    const HEADERS = { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY };

    let currentUser = null;
    let board = Array(4).fill().map(() => Array(4).fill(0));
    let score = 0;
    let highScore = 0;
    let gridElement;
    let touchStartX = 0, touchStartY = 0;

    const container = document.getElementById('container');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const welcomeTitle = document.getElementById('welcomeTitle');
    const gameScreen = document.getElementById('gameScreen');
    const currentUsernameEl = document.getElementById('currentUsername');
    const gameContainer = document.getElementById('gameContainer');

    function toggleForm() {
      container.classList.toggle('active');
      if (container.classList.contains('active')) {
        document.getElementById('overlayTitle').textContent = 'Chào bạn mới!';
        document.getElementById('overlayText').textContent = 'Nếu đã có tài khoản, vui lòng nhấn nút Đăng nhập bên dưới';
        document.querySelector('.overlay-btn').textContent = 'Đăng nhập';
      } else {
        document.getElementById('overlayTitle').textContent = 'Chào mừng trở lại!';
        document.getElementById('overlayText').textContent = 'Nếu chưa có tài khoản, vui lòng nhấn nút Đăng ký bên dưới';
        document.querySelector('.overlay-btn').textContent = 'Đăng ký';
      }
      document.getElementById('loginMessage').textContent = '';
      document.getElementById('registerMessage').textContent = '';
    }

    function showMessage(id, text, isSuccess = false) {
      const msg = document.getElementById(id);
      msg.textContent = text;
      msg.className = 'message ' + (isSuccess ? 'success' : 'error');
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === "password") {
        input.type = "text";
        btn.textContent = "visibility_off";
      } else {
        input.type = "password";
        btn.textContent = "visibility";
      }
    }

    async function simpleHash(str) {
      const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function getUsers() {
      try {
        const res = await fetch(API_URL, { headers: HEADERS });
        if (!res.ok) throw new Error();
        const { record } = await res.json();
        return record.users || [];
      } catch { return []; }
    }

    async function updateUsers(users) {
      try {
        const res = await fetch(API_URL, { method: "PUT", headers: HEADERS, body: JSON.stringify({ users }) });
        return res.ok;
      } catch { return false; }
    }

    async function handleRegister() {
      const username = document.getElementById("regUsername").value.trim();
      const password = document.getElementById("regPassword").value;
      if (!username || password.length < 6) {
        showMessage("registerMessage", "Tên đăng nhập và mật khẩu (ít nhất 6 ký tự) là bắt buộc!");
        return;
      }
      let users = await getUsers();
      if (users.some(u => u.username === username)) {
        showMessage("registerMessage", "Tên đăng nhập đã tồn tại!");
        return;
      }
      const hashed = await simpleHash(password);
      users.push({ username, password: hashed, highScore: 0, created: new Date().toISOString() });
      if (await updateUsers(users)) {
        showMessage("registerMessage", "🎉 Đăng ký thành công! Bạn có thể đăng nhập ngay bây giờ.", true);
        document.getElementById("regUsername").value = "";
        document.getElementById("regPassword").value = "";
      } else {
        showMessage("registerMessage", "Đăng ký thất bại, vui lòng thử lại sau.");
      }
    }

    async function handleLogin() {
      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value;
      if (!username || !password) {
        showMessage("loginMessage", "Vui lòng nhập đầy đủ thông tin!");
        return;
      }
      const users = await getUsers();
      const hashed = await simpleHash(password);
      const user = users.find(u => u.username === username && u.password === hashed);
      if (user) {
        currentUser = user;
        welcomeTitle.textContent = `Chào mừng quay lại, ${username}!`;
        document.getElementById('container').style.display = 'none';
        welcomeScreen.style.display = 'flex';
      } else {
        showMessage("loginMessage", "Sai tên đăng nhập hoặc mật khẩu!");
      }
    }

    function logout() { location.reload(); }

    function startGame() {
      welcomeScreen.style.display = 'none';
      gameScreen.style.display = 'flex';
      currentUsernameEl.textContent = currentUser.username;
      highScore = currentUser.highScore || 0;
      document.getElementById('highScore').textContent = highScore;
      newGame();
    }

    function newGame() {
      board = Array(4).fill().map(() => Array(4).fill(0));
      score = 0;
      document.getElementById('score').textContent = '0';
      document.getElementById('gameMessage').innerHTML = '';

      gridElement = document.getElementById('grid');
      gridElement.innerHTML = '';
      for (let i = 0; i < 16; i++) {
        const tile = document.createElement('div');
        tile.className = 'tile';
        gridElement.appendChild(tile);
      }
      addRandomTile(); addRandomTile();
      renderBoard();
    }

    function addRandomTile() {
      let empty = [];
      for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (board[r][c] === 0) empty.push({r,c});
      if (!empty.length) return;
      const {r,c} = empty[Math.floor(Math.random()*empty.length)];
      board[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function renderBoard() {
      const tiles = gridElement.children;
      let idx = 0;
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
          const val = board[r][c];
          const tile = tiles[idx++];
          tile.textContent = val || '';
          tile.className = 'tile' + (val ? ` tile-${val}` : '');
        }
      }
      document.getElementById('score').textContent = score;
    }

    async function saveHighScore() {
      if (!currentUser || score <= (currentUser.highScore || 0)) return;
      currentUser.highScore = score;
      let users = await getUsers();
      const i = users.findIndex(u => u.username === currentUser.username);
      if (i !== -1) users[i] = currentUser;
      await updateUsers(users);
      document.getElementById('highScore').textContent = score;
    }

    function checkGameState() {
      if (board.flat().includes(2048)) {
        document.getElementById('gameMessage').innerHTML = '🎉 Bạn đã thắng!';
        saveHighScore();
      } else if (isGameOver()) {
        document.getElementById('gameMessage').innerHTML = 'Game Over!';
        saveHighScore();
      }
    }

    function handleTouchStart(e) {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }

    function handleTouchEnd(e) {
      if (gameScreen.style.display !== 'flex') return;
      const deltaX = e.changedTouches[0].screenX - touchStartX;
      const deltaY = e.changedTouches[0].screenY - touchStartY;
      if (Math.abs(deltaX) < 40 && Math.abs(deltaY) < 40) return;

      let moved = false;
      if (Math.abs(deltaX) > Math.abs(deltaY)) {
        if (deltaX > 50) moved = moveRight();
        else if (deltaX < -50) moved = moveLeft();
      } else {
        if (deltaY > 50) moved = moveDown();
        else if (deltaY < -50) moved = moveUp();
      }
      if (moved) {
        addRandomTile();
        renderBoard();
        checkGameState();
      }
    }

    function handleKey(e) {
      if (gameScreen.style.display !== 'flex') return;
      let moved = false;
      if (e.key === "ArrowLeft") moved = moveLeft();
      else if (e.key === "ArrowRight") moved = moveRight();
      else if (e.key === "ArrowUp") moved = moveUp();
      else if (e.key === "ArrowDown") moved = moveDown();
      if (moved) {
        addRandomTile();
        renderBoard();
        checkGameState();
      }
    }

    const slide = (row) => {
      let arr = row.filter(v=>v);
      for (let i=0; i<arr.length-1; i++) {
        if (arr[i] === arr[i+1]) { arr[i]*=2; score += arr[i]; arr.splice(i+1,1); }
      }
      while(arr.length<4) arr.push(0);
      return arr;
    };

    const moveLeft = () => { let m=false; for(let r=0;r<4;r++){ let old=[...board[r]]; board[r]=slide(board[r]); if(JSON.stringify(old)!==JSON.stringify(board[r])) m=true; } return m; };
    const moveRight = () => { let m=false; for(let r=0;r<4;r++){ let old=[...board[r]]; board[r]=slide(board[r].reverse()).reverse(); if(JSON.stringify(old)!==JSON.stringify(board[r])) m=true; } return m; };
    const moveUp = () => { let m=false; for(let c=0;c<4;c++){ let col=board.map(r=>r[c]); let old=[...col]; col=slide(col); for(let r=0;r<4;r++) board[r][c]=col[r]; if(JSON.stringify(old)!==JSON.stringify(col)) m=true; } return m; };
    const moveDown = () => { let m=false; for(let c=0;c<4;c++){ let col=board.map(r=>r[c]); let old=[...col]; col=slide(col.reverse()).reverse(); for(let r=0;r<4;r++) board[r][c]=col[r]; if(JSON.stringify(old)!==JSON.stringify(col)) m=true; } return m; };

    function isGameOver() {
      if (board.flat().includes(0)) return false;
      for (let r=0;r<4;r++) for (let c=0;c<4;c++)
        if ((c<3 && board[r][c]===board[r][c+1]) || (r<3 && board[r][c]===board[r+1][c])) return false;
      return true;
    }

    document.addEventListener('keydown', handleKey);
    gameContainer.addEventListener('touchstart', handleTouchStart, { passive: true });
    gameContainer.addEventListener('touchend', handleTouchEnd, { passive: true });
  </script>
</body>
</html>
